services:
  postgres:
    image: postgres:16-alpine
    container_name: directqr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: directqr
      POSTGRES_USER: directqr
      POSTGRES_PASSWORD: directqr_local_password
    ports:
      - "5432:5432"
    volumes:
      - directqr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directqr -d directqr"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  directqr_pgdata:
